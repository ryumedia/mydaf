<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="msvalidate.01" content="EBC655347EF08F3BF703A65E7DD1279B" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Memuat Artikel... - MyDAF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap'); body{font-family:'Poppins',sans-serif;}</style>
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-[#311105]">MyDAF</a>
            <a href="index.html" class="text-sm text-gray-500 hover:text-[#311105]"><i class="fas fa-arrow-left"></i> Kembali</a>
        </div>
    </nav>

    <article class="max-w-4xl mx-auto bg-white min-h-screen shadow-sm">
        <img id="post-image" class="w-full h-[400px] object-cover hidden">
        <div class="p-8 md:p-16">
            <h1 id="post-title" class="text-3xl md:text-5xl font-bold text-gray-900 mb-6 leading-tight"></h1>
            <div class="flex items-center gap-4 text-gray-400 text-sm mb-10 pb-6 border-b">
                <span><i class="far fa-calendar-alt"></i> <span id="post-date"></span></span>
                <span><i class="far fa-user"></i> Admin MyDAF</span>
            </div>
            <div id="post-content" class="prose prose-lg max-w-none text-gray-700 leading-relaxed whitespace-pre-line">
                <!-- Isi artikel dimuat di sini -->
            </div>
        </div>
    </article>

    <footer class="bg-gray-900 text-gray-500 py-10 mt-12 text-center">
        <p>&copy; 2025 MyDAF. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOzzaPBhtRMEbDuNZUbPtxlwrJrK8exYE",
            authDomain: "mydaf-kafgb.firebaseapp.com",
            projectId: "mydaf-kafgb",
            storageBucket: "mydaf-kafgb.firebasestorage.app",
            messagingSenderId: "744858579208",
            appId: "1:744858579208:web:ccc660687fb33f4c95fcbd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fungsi untuk menyuntikkan script head dari CMS
        async function injectHeadScripts() {
            try {
                const scriptsDoc = await getDoc(doc(db, "settings", "scripts"));
                if (scriptsDoc.exists() && scriptsDoc.data().headCode) {
                    const headCode = scriptsDoc.data().headCode;
                    
                    // Gunakan DOMParser agar browser mengenali konteks meta/link tag dengan benar
                    const parser = new DOMParser();
                    const docParsed = parser.parseFromString(`<html><head>${headCode}</head><body></body></html>`, 'text/html');
                    const nodes = docParsed.head.childNodes;
                    
                    // Masukkan dari belakang ke depan dengan prepend agar urutan tetap sama di paling atas <head>
                    for (let i = nodes.length - 1; i >= 0; i--) {
                        const node = nodes[i];
                        if (node.nodeName === 'SCRIPT') {
                            const script = document.createElement('script');
                            Array.from(node.attributes).forEach(attr => script.setAttribute(attr.name, attr.value));
                            script.textContent = node.textContent;
                            document.head.prepend(script);
                        } else if (node.nodeType === 1) { // Element node (meta, link, dll)
                            document.head.prepend(node.cloneNode(true));
                        }
                    }
                }
            } catch (error) {
                console.error("Error injecting head scripts: ", error);
            }
        }

        async function loadSingleArticle() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('s');

            if (!slug) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const q = query(collection(db, "articles"), where("slug", "==", slug));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    document.getElementById('post-title').innerText = "Artikel Tidak Ditemukan";
                    return;
                }

                const data = querySnapshot.docs[0].data();
                
                // Update Meta & UI
                document.title = `${data.title} - MyDAF Blog`;
                document.getElementById('post-title').innerText = data.title;
                document.getElementById('post-content').innerText = data.content;
                
                if(data.image) {
                    const imgEl = document.getElementById('post-image');
                    imgEl.src = data.image;
                    imgEl.classList.remove('hidden');
                }

                if(data.createdAt) {
                    const date = data.createdAt.toDate();
                    document.getElementById('post-date').innerText = date.toLocaleDateString('id-ID', { 
                        day: 'numeric', month: 'long', year: 'numeric' 
                    });
                }
            } catch (error) {
                console.error(error);
            }
        }

        loadSingleArticle();
        injectHeadScripts();
    </script>
</body>
</html>
